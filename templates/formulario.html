{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Generador de Cotizaciones</title>
    <link rel="stylesheet" href="{% static 'formulario.css' %}" />
  </head>
  <body>
    <h1 style="text-align: center;">Generador de Cotizaciones</h1>
    <form method="post" action="{% url 'generar_pdf' %}">
      {% csrf_token %}

      <div class="campos-cliente">
        <!-- Fila 1 -->
        <div class="fila-doble">
          <div class="form-group">
            <label for="cliente">Cliente:</label>
            <input type="text" id="cliente" name="cliente" placeholder="Ingrese nombre del cliente" required />
          </div>
          <div class="form-group">
            <label for="dni">DNI/RUC:</label>
            <input type="text" id="dni" name="dni" placeholder="Ingrese DNI o RUC" />
          </div>
        </div>

        <!-- Fila 2 -->
        <div class="fila-doble">
          <div class="form-group">
            <label for="direccion">Dirección:</label>
            <textarea id="direccion" name="direccion" class="auto-grow" rows="1" placeholder="Ingrese dirección del cliente"></textarea>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" placeholder="Ingrese número telefónico" />
          </div>
        </div>

        <!-- Fila 3 -->
        <div class="fila-doble">
          <div class="form-group">
            <label for="provincia">Provincia:</label>
            <input type="text" id="provincia" name="provincia" placeholder="Ingrese la provincia" />
          </div>
          <div class="form-group">
            <label for="distrito">Distrito:</label>
            <input type="text" id="distrito" name="distrito" placeholder="Ingrese el distrito" />
          </div>
        </div>
      </div>

      <!-- Observaciones -->
      <div class="form-group area-observaciones">
        <label for="observaciones">Observaciones:</label>
        <textarea id="observaciones" name="observaciones" class="auto-grow" rows="1" placeholder="Escriba las observaciones que considere"></textarea>
      </div>

      <div style="margin-bottom: 10px;">
        <button type="button" class="btn-verde" id="agregar-producto">➕ Agregar Producto</button>
        <button type="submit" class="btn-azul">Generar PDF</button>
      </div>

      <table id="tabla-productos">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio (S/)</th>
            <th>Descuento (%)</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="productos-container">
          <tr class="producto-row">
            <td>
              <textarea name="producto" rows="1" class="auto-grow" required></textarea>
            </td>
            <td>
              <input type="number" name="cantidad" min="1" step="1" required />
            </td>
            <td>
              <input type="number" name="precio" min="0.01" step="0.01" required />
            </td>
            <td>
              <input type="number" name="dscto" min="0" max="100" step="0.01" />
            </td>
            <td class="acciones">
              <button type="button" class="btn-rojo eliminar-producto">X</button>
            </td>
          </tr>
        </tbody>
      </table>

      
    </form>

    <script src="{% static 'formulario.js' %}"></script>
  </body>
</html>
